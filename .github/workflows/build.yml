name: Build MAT267CAS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install all dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          cmake git python3 python3-pip \
          libpng-dev libusb-1.0-0-dev \
          pkg-config gcc-multilib \
          binutils-sh-elf gcc-sh-elf

    - name: Verify cross-compiler
      run: sh-elf-gcc --version

    - name: Install fxSDK
      run: |
        git clone https://gitea.planet-casio.com/Lephenixnoir/fxsdk.git
        cd fxsdk
        sed -i '/udisks2/d' CMakeLists.txt
        sed -i '/SDL2/d'    CMakeLists.txt
        sed -i '/ncurses/d' CMakeLists.txt
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_TESTING=OFF
        make -j$(nproc)
        sudo make install

    - name: Install gint
      run: |
        git clone https://gitea.planet-casio.com/Lephenixnoir/gint.git
        cd gint && fxsdk build-cg

    - name: Generate icon
      run: |
        pip3 install Pillow --break-system-packages
        python3 gen_icon.py

    - name: Build MAT267CAS.g3a
      run: |
        fxsdk build-cg
        ls -lh *.g3a

    - name: Upload g3a
      uses: actions/upload-artifact@v4
      with:
        name: MAT267CAS
        path: MAT267CAS.g3a
        retention-days: 30
