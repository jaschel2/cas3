name: Build MAT267CAS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project
      uses: actions/checkout@v4
      with:
        path: project

    - name: Checkout fxsdk
      uses: actions/checkout@v4
      with:
        repository: Lephenixnoir/fxsdk
        path: fxsdk

    - name: Checkout gint
      uses: actions/checkout@v4
      with:
        repository: Lephenixnoir/gint
        path: gint

    - name: Cache cross-compiler
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: /usr/local
        key: sh-elf-toolchain-v2

    - name: Install build dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y cmake python3 python3-pip \
          libpng-dev libusb-1.0-0-dev pkg-config \
          flex bison gawk texinfo libgmp-dev \
          libmpfr-dev libmpc-dev libisl-dev

    - name: Build cross-compiler
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        wget https://ftp.gnu.org/gnu/binutils/binutils-2.42.tar.gz
        tar xf binutils-2.42.tar.gz
        mkdir binutils-build && cd binutils-build
        ../binutils-2.42/configure \
          --target=sh3eb-elf --prefix=/usr/local \
          --disable-nls --disable-werror
        make -j$(nproc)
        sudo make install
        cd ..
        wget https://ftp.gnu.org/gnu/gcc/gcc-13.3.0/gcc-13.3.0.tar.gz
        tar xf gcc-13.3.0.tar.gz
        mkdir gcc-build && cd gcc-build
        ../gcc-13.3.0/configure \
          --target=sh3eb-elf --prefix=/usr/local \
          --enable-languages=c,c++ --without-headers \
          --disable-nls --disable-shared --disable-threads
        make -j$(nproc) all-gcc all-target-libgcc
        sudo make install-gcc install-target-libgcc

    - name: Install fxSDK
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        cd fxsdk
        sed -i '/udisks2/d' CMakeLists.txt
        sed -i '/SDL2/d'    CMakeLists.txt
        sed -i '/ncurses/d' CMakeLists.txt
        mkdir build && cd build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_TESTING=OFF
        make -j$(nproc)
        sudo make install

    - name: Install gint
      run: |
        cd gint && fxsdk build-cg

    - name: Generate icon
      run: |
        pip3 install Pillow --break-system-packages
        cd project && python3 gen_icon.py

    - name: Build MAT267CAS.g3a
      run: |
        cd project && fxsdk build-cg
        ls -lh *.g3a

    - name: Upload g3a
      uses: actions/upload-artifact@v4
      with:
        name: MAT267CAS
        path: project/MAT267CAS.g3a
        retention-days: 30
