name: Build MAT267CAS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: lephenixnoir/fxsdk:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Generate icon
      run: |
        pip3 install Pillow --break-system-packages
        python3 gen_icon.py

    - name: Build MAT267CAS.g3a
      run: |
        fxsdk build-cg
        ls -lh *.g3a

    - name: Upload g3a
      uses: actions/upload-artifact@v4
      with:
        name: MAT267CAS
        path: MAT267CAS.g3a
        retention-days: 30
